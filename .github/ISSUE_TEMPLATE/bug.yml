name: Bug
description: Report broken behavior.
title: "[Bug]: "
labels:
  - "type:bug"
body:
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open...
        2. Tap...
        3. See...
    validations:
      required: true
